[mypy]

# These packages don't provide type-stubs - the ones that provide stubs should be listed in `bazel/typing/mypy.patch`
[mypy-pyarrow.*]
ignore_missing_imports = True

[mypy-PIL.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-cv2.*]
ignore_missing_imports = True

[mypy-h5py.*]
ignore_missing_imports = True

[mypy-tqdm.*]
ignore_missing_imports = True

[mypy-detectron2.*]
ignore_missing_imports = True

[mypy-open3d.*]
ignore_missing_imports = True

[mypy-protobuf_to_dict.*]
ignore_missing_imports = True

[mypy-point_cloud_utils.*]
ignore_missing_imports = True

[mypy-webdataset.*]
ignore_missing_imports = True

# Ignore on purpose (using 'types-protobuf' fails for our protobuf version)
[mypy-google.protobuf.*]
ignore_missing_imports = True
