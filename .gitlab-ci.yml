variables:
  BAZELISK_VERSION: v1.12.0
  GIT_CLEAN_FLAGS: -ffdx -e .cache

default:
  image:
    name: gitlab-master.nvidia.com:5005/zgojcic/drivesim-ai:dev
  tags:
    - type/docker
    - os/linux
  before_script:
    # Install bazelisk
    - wget https://github.com/bazelbuild/bazelisk/releases/download/$BAZELISK_VERSION/bazelisk-linux-amd64 -O /usr/local/bin/bazelisk
    - chmod +x /usr/local/bin/bazelisk

    # Setup remote cache
    - echo "machine $ARTIFACTORY_MACHINE" >> ~/.netrc
    - echo "  login $ARTIFACTORY_LOGIN" >> ~/.netrc
    - echo "  password $ARTIFACTORY_PASSWORD" >> ~/.netrc
   
    # Enable all common ci options
    - echo "build --config=ci_options" >> .bazelrc.user

    # Enable remote-cache
    - echo "build --remote_cache=$REMOTE_CACHE_URL" >> .bazelrc.user
    - echo "test  --remote_cache=$REMOTE_CACHE_URL" >> .bazelrc.user

    # Setup persistent local disk-cache
    - echo "build --disk_cache=$CI_PROJECT_DIR/.cache" >> .bazelrc.user
    - echo "test  --disk_cache=$CI_PROJECT_DIR/.cache" >> .bazelrc.user

    # Setup persistent output folder
    # - echo "startup --output_base $CI_PROJECT_DIR/.keep/output" >> .bazelrc.user

build+test:
  stage: build
  script:
    - bazelisk version

    # Check format declarations are not missing
    - bazelisk run //:bzlformat_missing_pkgs_test

    # Build memory-heavy PoissonRec in single-job mode
    - bazelisk build --jobs=1 @PoissonRecon//:PoissonRecon -s
    
    # Build+test all remaining targets
    - bazelisk test ...
  allow_failure: false
