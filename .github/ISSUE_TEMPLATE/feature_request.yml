name: Feature Request
description: Suggest a new feature or enhancement for NCore
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please describe the problem you are trying to solve and the solution you would like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: A clear description of the problem or limitation you are experiencing.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear description of what you would like to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you have considered.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, references, or screenshots related to the feature request.
    validations:
      required: false
