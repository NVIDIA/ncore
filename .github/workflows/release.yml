# Prepare Release workflow.
#
# Creates a release PR with an updated CHANGELOG.md. The version is determined
# automatically from conventional commits (or manually via the bump type input).
# After the PR is reviewed and merged, the CI workflow detects the release commit,
# creates a git tag, publishes the wheel, and creates a GitHub Release.
#
# Prerequisites:
#   - A bootstrap tag (e.g., v18.5.0) must exist for cocogitto to compute versions.
#   - Repository workflow permissions must be set to "Read and write" with
#     "Allow GitHub Actions to create and approve pull requests" enabled.
#
# Note: PRs created by GITHUB_TOKEN won't trigger CI checks automatically
# (GitHub's anti-recursion protection). This is acceptable since the release
# PR only modifies CHANGELOG.md — CI runs on the merge commit to main.

name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (auto determines from conventional commits)'
        default: 'auto'
        type: choice
        options:
          - auto
          - major
          - minor
          - patch

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cocogitto
        uses: cocogitto/cocogitto-action@9a9fe03b31c47444290c0d7f9b1ee1b44ee13f20
        with:
          command: "--config .cog.toml get-version"

      - name: Bump version and update changelog
        id: version
        run: |
          # cog bump creates a commit (chore(version): vX.Y.Z) with the updated
          # CHANGELOG.md and a tag on that commit. We delete the tag since the
          # real tag is created by CI after the release PR merges to main.
          cog --config .cog.toml bump --${{ inputs.bump }}
          RAW=$(git describe --tags --abbrev=0)
          VERSION="${RAW#v}"
          git tag -d "$RAW"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/v${VERSION}"

          # The bump commit is already on HEAD — just branch and push
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore(version): v${VERSION}" \
            --base main \
            --head "$BRANCH" \
            --body "$(cat <<PREOF
          ## Release v${VERSION}

          This PR was auto-generated by the [Prepare Release](../actions/workflows/release.yml) workflow.

          ### Checklist

          - [ ] Review CHANGELOG.md
          - [ ] Merge to trigger tag creation + publish
          PREOF
          )"
